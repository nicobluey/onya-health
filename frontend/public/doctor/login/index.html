<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Login - Onya Health</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; background: #eef5ff; color: #12243f; }
      .container { max-width: 420px; margin: 10vh auto; background: #fff; border: 1px solid #d9e7ff; border-radius: 18px; padding: 28px; box-shadow: 0 12px 30px rgba(16, 70, 170, 0.08); }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 20px; color: #4f6fa6; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; border: 1px solid #c4d8ff; border-radius: 12px; padding: 12px; margin-bottom: 14px; }
      button { width: 100%; border: 0; border-radius: 12px; padding: 12px 14px; background: #0f66e8; color: #fff; font-weight: 700; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { margin-top: 12px; color: #b3122f; font-size: 13px; min-height: 16px; }
      .help { margin-top: 16px; font-size: 12px; color: #6b86b1; }
      code { background: #f4f8ff; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Doctor Review Login</h1>
      <p>Sign in to review pending medical certificates.</p>
      <form id="login-form">
        <label for="email">Doctor Email</label>
        <input id="email" name="email" type="email" placeholder="doctor@onyahealth.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />

        <button id="login-button" type="submit">Sign in</button>
        <div id="error" class="error"></div>
      </form>
      <p class="help">Default local credentials: <code>doctor@onyahealth.com</code> / <code>ChangeMe123!</code></p>
    </main>
    <script>
      const form = document.getElementById('login-form');
      const button = document.getElementById('login-button');
      const error = document.getElementById('error');

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        button.disabled = true;

        const formData = new FormData(form);
        const payload = {
          email: String(formData.get('email') || ''),
          password: String(formData.get('password') || ''),
        };

        try {
          const response = await fetch('/api/doctor/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.error || 'Login failed');
          }

          localStorage.setItem('onyaDoctorToken', data.token);
          window.location.href = '/doctor/queue';
        } catch (err) {
          error.textContent = err.message || 'Login failed';
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
