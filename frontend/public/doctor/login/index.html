<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Login - Onya Health</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; margin: 0; background: #eef5ff; color: #12243f; }
      .container { max-width: 440px; margin: 8vh auto; background: #fff; border: 1px solid #d9e7ff; border-radius: 18px; padding: 28px; box-shadow: 0 12px 30px rgba(16, 70, 170, 0.08); }
      h1 { margin: 0 0 8px; font-size: 28px; }
      p { margin: 0 0 20px; color: #4f6fa6; }
      label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
      input { width: 100%; box-sizing: border-box; border: 1px solid #c4d8ff; border-radius: 12px; padding: 12px; margin-bottom: 14px; }
      button { width: 100%; border: 0; border-radius: 12px; padding: 12px 14px; background: #0f66e8; color: #fff; font-weight: 700; cursor: pointer; }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .error { margin-top: 12px; color: #b3122f; font-size: 13px; min-height: 16px; }
      .success { margin-top: 12px; color: #0f7a42; font-size: 13px; min-height: 16px; }
      .help { margin-top: 16px; font-size: 12px; color: #6b86b1; }
      .mode { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; font-size: 13px; color: #315489; }
      .mode input { width: auto; margin: 0; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <main class="container">
      <h1>Doctor Review Access</h1>
      <p>Sign in to review pending medical certificates.</p>

      <form id="auth-form">
        <div class="mode">
          <input id="create-mode" type="checkbox" />
          <label for="create-mode" style="margin:0">Create a new doctor account</label>
        </div>

        <div id="name-wrap" class="hidden">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" type="text" placeholder="Dr Jane Smith" />
        </div>

        <label for="email">Doctor Email</label>
        <input id="email" name="email" type="email" placeholder="doctor@onyahealth.com" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="••••••••" required />

        <button id="auth-button" type="submit">Sign in</button>
        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
      </form>

      <p class="help">If your account does not exist yet, enable "Create a new doctor account" and submit.</p>
    </main>

    <script>
      const form = document.getElementById('auth-form');
      const button = document.getElementById('auth-button');
      const error = document.getElementById('error');
      const success = document.getElementById('success');
      const createMode = document.getElementById('create-mode');
      const nameWrap = document.getElementById('name-wrap');
      const fullNameInput = document.getElementById('fullName');

      createMode.addEventListener('change', () => {
        const isCreate = createMode.checked;
        nameWrap.classList.toggle('hidden', !isCreate);
        fullNameInput.required = isCreate;
        button.textContent = isCreate ? 'Create account' : 'Sign in';
        error.textContent = '';
        success.textContent = '';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        error.textContent = '';
        success.textContent = '';
        button.disabled = true;

        const isCreate = createMode.checked;
        const formData = new FormData(form);
        const payload = {
          fullName: String(formData.get('fullName') || ''),
          email: String(formData.get('email') || ''),
          password: String(formData.get('password') || ''),
        };

        const endpoint = isCreate ? '/api/doctor/register' : '/api/doctor/login';

        try {
          const response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          let data = {};
          try {
            data = await response.json();
          } catch {
            data = {};
          }

          if (!response.ok) {
            throw new Error(data.error || 'Request failed');
          }

          localStorage.setItem('onyaDoctorToken', data.token);
          success.textContent = isCreate ? 'Account created. Redirecting to queue...' : 'Signed in. Redirecting...';
          window.location.href = '/doctor/queue';
        } catch (err) {
          error.textContent = err.message || 'Login failed';
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
